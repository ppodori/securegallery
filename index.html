  _layoutMultiView(c) {
    if (this.viewCount <= 1) return;
    const wraps = c.querySelectorAll('.lb-media-wrap');
    if (!wraps.length) return;
    const ch = c.offsetHeight;
    const cw = c.offsetWidth;
    const gap = this.viewCount === 2 ? 4 : 3;
    const availW = cw - gap * (wraps.length - 1);

    let totalNatW = 0;
    const natWidths = [];
    wraps.forEach(wrap => {
      const media = wrap.querySelector('img, video');
      const nw = media.naturalWidth || media.videoWidth || 1;
      const nh = media.naturalHeight || media.videoHeight || 1;
      const natW = ch * (nw / nh);
      natWidths.push(natW);
      totalNatW += natW;
    });

    const scale = Math.min(1, availW / totalNatW);
    wraps.forEach((wrap, i) => {
      wrap.style.flex = 'none';
      wrap.style.width = Math.floor(natWidths[i] * scale) + 'px';
    });
  },

  scrollToItem(idx) {
    const grid = document.getElementById('galleryGrid');
    if (!grid) return;

    // Already loaded — just scroll
    if (idx < this._galleryLoaded) {
      const item = grid.querySelector(`[data-idx="${idx}"]`);
      if (item) requestAnimationFrame(() => item.scrollIntoView({ block: 'center', behavior: 'instant' }));
      return;
    }

    // Small gap (< 300) — load batches normally
    if (idx < this._galleryLoaded + 300) {
      while (idx >= this._galleryLoaded && this._galleryLoaded < this.currentFiles.length) {
        this._galleryLoadBatch();
      }
      const item = grid.querySelector(`[data-idx="${idx}"]`);
      if (item) requestAnimationFrame(() => item.scrollIntoView({ block: 'center', behavior: 'instant' }));
      return;
    }

    // Large jump — spacer approach
    this._jumpToItem(idx);
  },

  _jumpToItem(idx) {
    const grid = document.getElementById('galleryGrid');
    if (!grid) return;

    // Clear everything
    grid.innerHTML = '';
    this._thumbQueue = [];
    this._lastRenderedMonth = null;

    const buffer = this._isMobile ? 50 : 100;
    const BATCH = this._isMobile ? 30 : 50;
    const startIdx = Math.max(0, idx - buffer);

    // Track spacer range
    this._spacerEndIdx = startIdx; // items 0..(startIdx-1) are in spacer

    // Calculate spacer height for skipped items
    if (startIdx > 0) {
      const gap = 8;
      const cols = Math.max(1, Math.floor((grid.clientWidth + gap) / (this.gridSize + gap)));
      const rowH = this.gridSize + gap;
      const skipRows = Math.ceil(startIdx / cols);
      const spacer = document.createElement('div');
      spacer.className = 'grid-spacer';
      spacer.style.cssText = `grid-column:1/-1;height:${skipRows * rowH}px`;
      grid.appendChild(spacer);

      // Observer: when spacer becomes visible, load items upward
      this._spacerObs = new IntersectionObserver(entries => {
        if (!entries[0].isIntersecting) return;
        this._loadUpward();
      }, { root: document.getElementById('contentScroll'), rootMargin: '200px' });
      this._spacerObs.observe(spacer);
    }

    // Load items from startIdx onward
    this._galleryLoaded = startIdx;
    const targetEnd = Math.min(idx + buffer, this.currentFiles.length);
    while (this._galleryLoaded < targetEnd && this._galleryLoaded < this.currentFiles.length) {
      this._galleryLoadBatch();
    }

    // Scroll to target
    const item = grid.querySelector(`[data-idx="${idx}"]`);
    if (item) requestAnimationFrame(() => item.scrollIntoView({ block: 'center', behavior: 'instant' }));
  },

  _loadUpward() {
    const grid = document.getElementById('galleryGrid');
    const spacer = grid?.querySelector('.grid-spacer');
    if (!spacer || this._spacerEndIdx <= 0) return;

    const BATCH = this._isMobile ? 30 : 50;
    const gap = 8;
    const cols = Math.max(1, Math.floor((grid.clientWidth + gap) / (this.gridSize + gap)));
    const rowH = this.gridSize + gap;

    // Load one batch upward
    const loadFrom = Math.max(0, this._spacerEndIdx - BATCH);
    const loadTo = this._spacerEndIdx;

    const frag = document.createDocumentFragment();
    const toObserve = [];
    const showDateSep = this._currentSort === 'date_asc' || this._currentSort === 'date_desc';
    let prevMonth = null;
    for (let i = loadFrom; i < loadTo; i++) {
      const file = this.currentFiles[i];
      if (!file) continue;
      // Date separator
      if (showDateSep && file.mtime) {
        const d = new Date(file.mtime);
        const monthKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        if (monthKey !== prevMonth) {
          prevMonth = monthKey;
          const sep = document.createElement('div');
          sep.className = 'date-sep';
          sep.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${d.getFullYear()}년 ${d.getMonth()+1}월`;
          frag.appendChild(sep);
        }
      }
      const el = document.createElement('div');
      el.className = 'gallery-item';
      el.dataset.idx = i;
      el.onclick = (e) => {
        if (e.target.closest('.sel-check')) return;
        this.openLightbox(i);
      };
      const cached = this.thumbCache.get(file.thumbDriveId);
      let ih = cached ? `<img src="${cached}">` : `<div class="loading-placeholder"><div class="spinner"></div></div>`;
      if (file.type?.startsWith('video/')) ih += `<div class="vid-badge">▶</div>`;
      if (this.favSet.has(file.origDriveId)) ih += `<div class="fav-badge">❤</div>`;
      const sizeStr = file.size ? (file.size < 1048576 ? (file.size/1024).toFixed(0)+'KB' : (file.size/1048576).toFixed(1)+'MB') : '';
      const dateStr = file.mtime ? new Date(file.mtime).toISOString().slice(0, 10) : '';
      ih += `<div class="hover-info"><div class="hi-name">${this.esc(file.name)}</div><div class="hi-size">${sizeStr}${dateStr ? '  ·  ' + dateStr : ''}</div></div>`;
      ih += `<div class="sel-check" onclick="event.stopPropagation();app.toggleSelect(${i},event.shiftKey)"></div>`;
      el.innerHTML = ih;
      if (!cached) { el.dataset.thumbId = file.thumbDriveId; toObserve.push(el); }
      frag.appendChild(el);
    }

    // Insert after spacer (before existing items)
    spacer.after(frag);
    for (const el of toObserve) this._thumbObserver.observe(el);

    // Remove duplicate date separator between upward batch and existing items
    if (showDateSep && prevMonth) {
      // Find the first existing element after our inserted items
      const allItems = grid.querySelectorAll('.gallery-item, .date-sep');
      for (const node of allItems) {
        if (node.classList.contains('gallery-item') && parseInt(node.dataset.idx) >= loadTo) {
          // Check the element right before this first existing item
          const prev = node.previousElementSibling;
          if (prev && prev.classList.contains('date-sep')) {
            // Check month by looking at the first existing item's month
            const existFile = this.currentFiles[parseInt(node.dataset.idx)];
            if (existFile?.mtime) {
              const ed = new Date(existFile.mtime);
              const existMonth = `${ed.getFullYear()}-${String(ed.getMonth()+1).padStart(2,'0')}`;
              if (existMonth === prevMonth) prev.remove();
            }
          }
          break;
        }
      }
    }

    // Update spacer
    this._spacerEndIdx = loadFrom;
    if (this._spacerEndIdx <= 0) {
      // Remove spacer entirely
      if (this._spacerObs) this._spacerObs.disconnect();
      spacer.remove();
    } else {
      const skipRows = Math.ceil(this._spacerEndIdx / cols);
      spacer.style.height = `${skipRows * rowH}px`;
    }
  },
  showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); },
  showError(m) { const e=document.getElementById('loginError'); e.textContent=m; e.style.display='block'; },
  toast(m) {
    // Show centered toast inside lightbox
    if (document.getElementById('lightbox').classList.contains('active')) {
      const lt = document.getElementById('lbToast');
      if (lt) { lt.textContent = m; lt.style.opacity = '1'; clearTimeout(lt._timer); lt._timer = setTimeout(() => lt.style.opacity = '0', 1500); }
      return;
    }
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
  },
  lbRandom() {
    if (this.currentFiles.length <= 1) return;
    let n; do { n = Math.floor(Math.random() * this.currentFiles.length); } while (n === this.lbIndex);
    if (this.ssRunning) { clearTimeout(this.ssTimer); this.ssTimer = null; }
    this.lbIndex = n;
    this.showLBItem(n).then(() => { if (this.ssRunning) this.ssScheduleNext(); });
  },

  // ===== SORT =====
  _currentSort: 'date_asc',

  toggleNameSort() {
    const newMode = this._currentSort === 'name_asc' ? 'name_desc' : 'name_asc';
    this.sortFiles(newMode);
  },

  toggleSizeSort() {
    const newMode = this._currentSort === 'size_asc' ? 'size_desc' : 'size_asc';
    this.sortFiles(newMode);
  },

  toggleDateSort() {
    const newMode = this._currentSort === 'date_desc' ? 'date_asc' : 'date_desc';
    this.sortFiles(newMode);
  },

  sortFiles(mode) {
    if (!this.originalFiles.length) {
      this.originalFiles = [...this.currentFiles];
    }

    switch (mode) {
      case 'name_asc':
        this.currentFiles = [...this.originalFiles].sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric:true}));
        break;
      case 'name_desc':
        this.currentFiles = [...this.originalFiles].sort((a, b) => b.name.localeCompare(a.name, undefined, {numeric:true}));
        break;
      case 'size_asc':
        this.currentFiles = [...this.originalFiles].sort((a, b) => (a.size || 0) - (b.size || 0));
        break;
      case 'size_desc':
        this.currentFiles = [...this.originalFiles].sort((a, b) => (b.size || 0) - (a.size || 0));
        break;
      case 'date_asc':
        this.currentFiles = [...this.originalFiles].sort((a, b) => {
          const at = a.mtime || 0, bt = b.mtime || 0;
          if (!at && !bt) return 0;
          if (!at) return 1;
          if (!bt) return -1;
          return at - bt;
        });
        break;
      case 'date_desc':
        this.currentFiles = [...this.originalFiles].sort((a, b) => {
          const at = a.mtime || 0, bt = b.mtime || 0;
          if (!at && !bt) return 0;
          if (!at) return 1;
          if (!bt) return -1;
          return bt - at;
        });
        break;
      case 'shuffle':
        this.currentFiles = [...this.originalFiles];
        for (let i = this.currentFiles.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [this.currentFiles[i], this.currentFiles[j]] = [this.currentFiles[j], this.currentFiles[i]];
        }
        break;
      case 'added_desc':
        if (this._favMode) {
          const favOrder = new Map(this.favData.map((f, i) => [f.origDriveId, i]));
          this.currentFiles = [...this.originalFiles].sort((a, b) => (favOrder.get(b.origDriveId) ?? 0) - (favOrder.get(a.origDriveId) ?? 0));
        }
        break;
      case 'added_asc':
        if (this._favMode) {
          const favOrder2 = new Map(this.favData.map((f, i) => [f.origDriveId, i]));
          this.currentFiles = [...this.originalFiles].sort((a, b) => (favOrder2.get(a.origDriveId) ?? 0) - (favOrder2.get(b.origDriveId) ?? 0));
        }
        break;
    }
    this._currentSort = mode;
    this.shuffled = (mode === 'shuffle');
    // Re-apply month filter after sort
    if (this._monthFilter) {
      this._preMonthFiles = [...this.currentFiles];
      this.originalFiles = this._preMonthFiles;
      this.currentFiles = this._preMonthFiles.filter(f => {
        if (!f.mtime) return false;
        const d = new Date(f.mtime);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` === this._monthFilter;
      });
      document.getElementById('fileCount').textContent = `${this.currentFiles.length.toLocaleString()}개 파일`;
    }
    this.renderGallery();

    // Update button arrows and active states
    const nameArrow = document.getElementById('sortNameArrow');
    const sizeArrow = document.getElementById('sortSizeArrow');
    const dateArrow = document.getElementById('sortDateArrow');
    if (nameArrow) nameArrow.textContent = this._currentSort === 'name_desc' ? '↓' : '↑';
    if (sizeArrow) sizeArrow.textContent = this._currentSort === 'size_desc' ? '↓' : '↑';
    if (dateArrow) dateArrow.textContent = this._currentSort === 'date_asc' ? '↑' : '↓';
    document.querySelectorAll('.shuffle-btn, #sortNameBtn, #sortSizeBtn, #sortDateBtn, #sortAddedBtn').forEach(b => b.classList.remove('active'));
    const activeMap = { shuffle: '.shuffle-btn', name_asc: '#sortNameBtn', name_desc: '#sortNameBtn', size_asc: '#sortSizeBtn', size_desc: '#sortSizeBtn', date_asc: '#sortDateBtn', date_desc: '#sortDateBtn', added_desc: '#sortAddedBtn', added_asc: '#sortAddedBtn' };
    const activeEl = document.querySelector(activeMap[mode]);
    if (activeEl) activeEl.classList.add('active');
    // Update added arrow
    const addedArrow = document.getElementById('sortAddedArrow');
    if (addedArrow) addedArrow.textContent = this._currentSort === 'added_asc' ? '↑' : '↓';

    const labels = { name_asc: '이름 ↑', name_desc: '이름 ↓', size_asc: '크기 ↑', size_desc: '크기 ↓', date_asc: '날짜 ↑ (오래된순)', date_desc: '날짜 ↓ (최신순)', shuffle: '🔀 셔플', added_desc: '추가순 ↓ (최신)', added_asc: '추가순 ↑ (오래된순)' };
    this.toast(`정렬: ${labels[mode]}`);
  },

  // ===== MULTI-SELECT =====
  toggleSelect(idx, shiftKey) {
    const file = this.currentFiles[idx];
    if (!file) return;

    if (shiftKey && this._lastSelectedIdx >= 0) {
      const from = Math.min(this._lastSelectedIdx, idx);
      const to = Math.max(this._lastSelectedIdx, idx);
      for (let i = from; i <= to; i++) {
        const f = this.currentFiles[i];
        if (f) this.selectedSet.add(f.origDriveId);
      }
    } else {
      if (this.selectedSet.has(file.origDriveId)) {
        this.selectedSet.delete(file.origDriveId);
      } else {
        this.selectedSet.add(file.origDriveId);
      }
    }
    this._lastSelectedIdx = idx;
    this._updateSelectionUI();
  },

  clearSelection() {
    this.selectedSet.clear();
    this._lastSelectedIdx = -1;
    this._updateSelectionUI();
  },

  _updateSelectionUI() {
    // Update grid items
    document.querySelectorAll('#galleryGrid .gallery-item').forEach(el => {
      const idx = parseInt(el.dataset.idx);
      const file = this.currentFiles[idx];
      if (file) el.classList.toggle('selected', this.selectedSet.has(file.origDriveId));
    });
    // Show/hide batch actions
    const ba = document.getElementById('batchActions');
    const count = this.selectedSet.size;
    if (ba) {
      ba.classList.toggle('show', count > 0);
      document.getElementById('batchCount').textContent = count > 0 ? `${count}개 선택` : '';
    }
  },

  batchFavAdd() {
    let added = 0;
    for (const id of this.selectedSet) {
      if (this.favSet.has(id)) continue;
      const f = this.currentFiles.find(x => x.origDriveId === id);
      if (!f) continue;
      this.favSet.add(id);
      this.favData.push({
        origDriveId: f.origDriveId, thumbDriveId: f.thumbDriveId,
        name: f.name, type: f.type, size: f.size, mtime: f.mtime,
        _folderId: f._folderId || this.currentFolderId,
        _folderName: f._folderName || (this.navStack.length ? this.navStack[this.navStack.length - 1].name : '')
      });
      added++;
    }
    this.saveFavorites();
    this.clearSelection();
    this.updateFavBadges();
    this.toast(`즐겨찾기 ${added}개 추가`);
  },

  batchFavRemove() {
    let removed = 0;
    for (const id of this.selectedSet) {
      if (!this.favSet.has(id)) continue;
      this.favSet.delete(id);
      this.favData = this.favData.filter(d => d.origDriveId !== id);
      removed++;
    }
    this.saveFavorites();
    this.clearSelection();
    this.updateFavBadges();
    this.toast(`즐겨찾기 ${removed}개 해제`);
  },

  batchDelete() {
    const ids = [...this.selectedSet];
    for (const id of ids) {
      const f = this.currentFiles.find(x => x.origDriveId === id);
      if (!f) continue;
      this.hiddenSet.add(id);
      this.hiddenData.push({
        origDriveId: f.origDriveId, thumbDriveId: f.thumbDriveId,
        name: f.name, type: f.type, size: f.size,
        _folderId: f._folderId || this.currentFolderId,
        _folderName: f._folderName || (this.navStack.length ? this.navStack[this.navStack.length - 1].name : ''),
        _hiddenAt: Date.now()
      });
      // Also remove from favorites
      if (this.favSet.has(id)) {
        this.favSet.delete(id);
        this.favData = this.favData.filter(d => d.origDriveId !== id);
      }
    }
    this.currentFiles = this.currentFiles.filter(f => !this.selectedSet.has(f.origDriveId));
    if (this.originalFiles.length) {
      this.originalFiles = this.originalFiles.filter(f => !this.selectedSet.has(f.origDriveId));
    }
    if (this._folderFilesCache) {
      this._folderFilesCache = this._folderFilesCache.filter(f => !this.selectedSet.has(f.origDriveId));
    }
    this.saveHidden();
    this.saveFavorites();
    document.getElementById('fileCount').textContent = `${this.currentFiles.length.toLocaleString()}개 파일`;
    const count = ids.length;
    this.clearSelection();
    this.renderGallery();
    this.toast(`${count}개 삭제됨`);
  },

  // ===== FAVORITES VIEW =====
  openFavorites() {
    this._favMode = true;
    this._trashMode = false;
    this._favFilter = 'all';
    this._favStatusFilter = 'all';
    this._folderFilesCache = null;
    this.navStack = [{ id: '__favorites__', name: '❤ 즐겨찾기' }];
    this.currentFolderId = '__favorites__';

    this.stopSlideshow(true);
    if (this.bgPreloadAbort) this.bgPreloadAbort.abort = true;
    this.preloadCache.forEach(u => URL.revokeObjectURL(u));
    this.preloadCache.clear();
    this._thumbQueue = [];
    this.shuffled = false;
    this.selectedSet.clear(); this._lastSelectedIdx = -1;
    this.originalFiles = [];
    this._monthFilter = null; this._preMonthFiles = [];
    const _mfChip = document.getElementById('monthFilterChip'); if (_mfChip) _mfChip.remove();
    const _mfPanel = document.getElementById('monthPickerPanel'); if (_mfPanel) _mfPanel.classList.remove('open');
    const _mfBtn = document.getElementById('monthPickerBtn'); if (_mfBtn) { _mfBtn.classList.remove('active'); _mfBtn.classList.remove('filtered'); }

    this.showScreen('mainScreen');
    this.renderBreadcrumb();
    if (!this._skipHistory) { this._saveScrollToHistory(); history.pushState({ view: 'favorites' }, ''); }

    const allFavFiles = [...this.favData].reverse();
    this.currentFiles = allFavFiles;
    this.originalFiles = [...allFavFiles];
    this._currentSort = 'added_desc';

    const area = document.getElementById('contentArea');
    const toolbar = document.getElementById('toolbar');
    toolbar.style.display = 'flex';
    document.getElementById('fileCount').textContent = `${allFavFiles.length.toLocaleString()}개 파일`;

    // Add filter buttons to toolbar (before spacer) — no fav status filter in favorites view
    this._orientFilter = 'all';
    let filterDiv = document.getElementById('favFilterDiv');
    if (!filterDiv) {
      filterDiv = document.createElement('div');
      filterDiv.id = 'favFilterDiv';
      filterDiv.className = 'fav-filter';
      filterDiv.innerHTML = this._getFilterHTML(false);
      toolbar.insertBefore(filterDiv, toolbar.querySelector('.spacer'));
    } else {
      filterDiv.style.display = 'flex';
      filterDiv.innerHTML = this._getFilterHTML(false);
    }
    // Add "추가순" sort button (favorites only) — after date button
    let addedBtn = document.getElementById('sortAddedBtn');
    if (!addedBtn) {
      addedBtn = document.createElement('button');
      addedBtn.id = 'sortAddedBtn';
      addedBtn.className = 'sort-btn active';
      addedBtn.style.cssText = 'background:rgba(168,85,247,0.15);color:#c084fc;border:1px solid rgba(168,85,247,0.2);';
      addedBtn.innerHTML = '<svg class="sort-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg> 추가순 <span class="sort-arrow" id="sortAddedArrow">↓</span>';
      addedBtn.onclick = () => this.sortFiles(this._currentSort === 'added_desc' ? 'added_asc' : 'added_desc');
      const dateBtn = document.getElementById('sortDateBtn');
      if (dateBtn) dateBtn.after(addedBtn);
      else toolbar.insertBefore(addedBtn, toolbar.querySelector('.spacer'));
    } else {
      addedBtn.style.display = '';
      addedBtn.classList.add('active');
    }

    area.innerHTML = `<div class="gallery-grid" id="galleryGrid" style="grid-template-columns:repeat(auto-fill,minmax(${this.gridSize}px,1fr))"></div>`;
    this.renderGallery();
  },

  _getFilterHTML(showFavStatus) {
    let html = `<button class="active" data-filter="type" onclick="app.filterType('all')">전체</button><button data-filter="type" onclick="app.filterType('image')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-1px"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg> 사진</button><button data-filter="type" onclick="app.filterType('video')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-1px"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg> 영상</button><span style="margin:0 4px;color:var(--border)">│</span><button data-filter="orient" onclick="app.filterOrientation('portrait')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-1px"><rect x="6" y="3" width="12" height="18" rx="2"/></svg> 세로</button><button data-filter="orient" onclick="app.filterOrientation('landscape')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-1px"><rect x="3" y="6" width="18" height="12" rx="2"/></svg> 가로</button>`;
    if (showFavStatus) {
      html += `<span style="margin:0 4px;color:var(--border)">│</span><button class="active" data-filter="favst" onclick="app.filterFavStatus('all')">모두</button><button data-filter="favst" onclick="app.filterFavStatus('fav')"><svg width="12" height="12" viewBox="0 0 24 24" fill="#ff3b5c" stroke="none" style="vertical-align:-1px"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> 즐겨찾기</button><button data-filter="favst" onclick="app.filterFavStatus('nonfav')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-1px"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> 미등록</button>`;
    }
    return html;
  },

  _isPortrait(f) {
    const n = f._folderName || '';
    return /^\d+$/.test(n) || n.startsWith('Soft_') || n === '2.Portrait';
  },

  _isLandscape(f) {
    const n = f._folderName || '';
    return /^[Ww]ide_/.test(n) || n === '1.Landscape';
  },

  filterType(mode) {
    this._favFilter = mode;
    this._applyFilters();
  },

  filterOrientation(mode) {
    // Toggle: clicking same orientation deactivates
    this._orientFilter = this._orientFilter === mode ? 'all' : mode;
    this._applyFilters();
  },

  filterFavStatus(mode) {
    this._favStatusFilter = this._favStatusFilter === mode && mode !== 'all' ? 'all' : mode;
    this._applyFilters();
  },

  // Legacy alias
  filterFavorites(mode) { this.filterType(mode); },

  _applyFilters() {
    let source;
    if (this.currentFolderId === '__favorites__') {
      source = [...this.favData].reverse();
    } else if (this.currentFolderId === '__random1000__') {
      source = [...this._r1000Cache];
    } else {
      source = [...(this._folderFilesCache || this.originalFiles)];
    }

    // Type filter
    if (this._favFilter === 'image') {
      source = source.filter(f => !f.type?.startsWith('video/'));
    } else if (this._favFilter === 'video') {
      source = source.filter(f => f.type?.startsWith('video/'));
    }

    // Orientation filter
    if (this._orientFilter === 'portrait') {
      source = source.filter(f => this._isPortrait(f));
    } else if (this._orientFilter === 'landscape') {
      source = source.filter(f => this._isLandscape(f));
    }

    // Favorites status filter
    if (this._favStatusFilter === 'fav') {
      source = source.filter(f => this.favSet.has(f.origDriveId));
    } else if (this._favStatusFilter === 'nonfav') {
      source = source.filter(f => !this.favSet.has(f.origDriveId));
    }

    this.currentFiles = source;
    this.originalFiles = [...source];
    document.getElementById('fileCount').textContent = `${this.currentFiles.length.toLocaleString()}개 파일`;

    // Update type button states
    document.querySelectorAll('#favFilterDiv [data-filter="type"]').forEach(b => b.classList.remove('active'));
    const typeIdx = { all: 0, image: 1, video: 2 };
    const typeBtns = document.querySelectorAll('#favFilterDiv [data-filter="type"]');
    if (typeBtns[typeIdx[this._favFilter]]) typeBtns[typeIdx[this._favFilter]].classList.add('active');

    // Update orientation button states
    document.querySelectorAll('#favFilterDiv [data-filter="orient"]').forEach(b => b.classList.remove('active'));
    if (this._orientFilter !== 'all') {
      const orientBtns = document.querySelectorAll('#favFilterDiv [data-filter="orient"]');
      if (this._orientFilter === 'portrait' && orientBtns[0]) orientBtns[0].classList.add('active');
      if (this._orientFilter === 'landscape' && orientBtns[1]) orientBtns[1].classList.add('active');
    }

    // Update favorites status button states
    document.querySelectorAll('#favFilterDiv [data-filter="favst"]').forEach(b => b.classList.remove('active'));
    const favStIdx = { all: 0, fav: 1, nonfav: 2 };
    const favStBtns = document.querySelectorAll('#favFilterDiv [data-filter="favst"]');
    if (favStBtns[favStIdx[this._favStatusFilter]]) favStBtns[favStIdx[this._favStatusFilter]].classList.add('active');

    if (this._currentSort !== 'date_asc') this.sortFiles(this._currentSort);
    else this.renderGallery();
  },

  // ===== HIDDEN FILES =====
  async loadHidden() {
    try {
      const fid = await Drive.findFile('_hidden.enc', this.rootDriveId);
      if (fid) {
        this.hiddenFileId = fid;
        const list = await Crypto.decryptJSON(this.key, await Drive.download(fid));
        // Migration: old format is string array, new format is object array
        if (list.length > 0 && typeof list[0] === 'string') {
          this.hiddenSet = new Set(list);
          this.hiddenData = list.map(id => ({ origDriveId: id, name: '(이전 데이터)', _hiddenAt: 0 }));
        } else {
          this.hiddenData = list;
          this.hiddenSet = new Set(list.map(f => f.origDriveId));
        }
        console.log(`숨김 파일 ${this.hiddenSet.size}개 로드됨`);
      }
    } catch (e) {
      console.error('Hidden list load failed:', e);
    }
  },

  async saveHidden() {
    try {
      const enc = await Crypto.encryptJSON(this.key, this.hiddenData);
      if (this.hiddenFileId) {
        await Drive.update(this.hiddenFileId, enc);
      } else {
        this.hiddenFileId = await Drive.upload('_hidden.enc', enc, this.rootDriveId);
      }
    } catch (e) {
      console.error('Hidden list save failed:', e);
      this.toast('숨김 목록 저장 실패');
    }
  },

  async hideCurrentFile() {
    if (!this.currentFiles.length) return;
    const f = this.currentFiles[this.lbIndex];
    this.hiddenSet.add(f.origDriveId);
    this.hiddenData.push({
      origDriveId: f.origDriveId, thumbDriveId: f.thumbDriveId,
      name: f.name, type: f.type, size: f.size,
      _folderId: f._folderId || this.currentFolderId,
      _folderName: f._folderName || (this.navStack.length ? this.navStack[this.navStack.length - 1].name : ''),
      _hiddenAt: Date.now()
    });

    // Also remove from favorites
    if (this.favSet.has(f.origDriveId)) {
      this.favSet.delete(f.origDriveId);
      this.favData = this.favData.filter(d => d.origDriveId !== f.origDriveId);
      this.saveFavorites();
    }

    // Remove from current list
    this.currentFiles.splice(this.lbIndex, 1);
    if (this.originalFiles.length) {
      this.originalFiles = this.originalFiles.filter(of => of.origDriveId !== f.origDriveId);
    }
    if (this._folderFilesCache) {
      this._folderFilesCache = this._folderFilesCache.filter(of => of.origDriveId !== f.origDriveId);
    }

    this.saveHidden();
    document.getElementById('fileCount').textContent = `${this.currentFiles.length.toLocaleString()}개 파일`;

    if (this.currentFiles.length === 0) {
      this.closeLightbox();
      this.renderGallery();
    } else {
      if (this.lbIndex >= this.currentFiles.length) this.lbIndex = this.currentFiles.length - 1;
      await this.showLBItem(this.lbIndex);
      this.renderGallery();
    }
    this.toast('숨김 처리됨');
  },

  // ===== TRASH VIEW =====
  openTrash() {
    this._favMode = false;
    this._trashMode = true;
    this._favStatusFilter = 'all';
    this._folderFilesCache = null;
    this.navStack = [{ id: '__trash__', name: '휴지통' }];
    this.currentFolderId = '__trash__';

    this.stopSlideshow(true);
    if (this.bgPreloadAbort) this.bgPreloadAbort.abort = true;
    this.preloadCache.forEach(u => URL.revokeObjectURL(u));
    this.preloadCache.clear();
    this._thumbQueue = [];
    this.shuffled = false;
    this.selectedSet.clear(); this._lastSelectedIdx = -1;
    this.originalFiles = [];
    this._monthFilter = null; this._preMonthFiles = [];
    const _mtrChip = document.getElementById('monthFilterChip'); if (_mtrChip) _mtrChip.remove();
    const _mtrPanel = document.getElementById('monthPickerPanel'); if (_mtrPanel) _mtrPanel.classList.remove('open');
    const _mtrBtn = document.getElementById('monthPickerBtn'); if (_mtrBtn) { _mtrBtn.classList.remove('active'); _mtrBtn.classList.remove('filtered'); }

    this.showScreen('mainScreen');
    this.renderBreadcrumb();
    if (!this._skipHistory) { this._saveScrollToHistory(); history.pushState({ view: 'trash' }, ''); }

    const trashFiles = [...this.hiddenData].reverse();
    this.currentFiles = trashFiles;
    this.originalFiles = [...trashFiles];

    const area = document.getElementById('contentArea');
    const toolbar = document.getElementById('toolbar');
    toolbar.style.display = 'flex';
    document.getElementById('fileCount').textContent = `${trashFiles.length.toLocaleString()}개 파일`;

    // Hide fav filter if visible
    const filterDiv = document.getElementById('favFilterDiv');
    if (filterDiv) filterDiv.style.display = 'none';

    area.innerHTML = `<div class="gallery-grid" id="galleryGrid" style="grid-template-columns:repeat(auto-fill,minmax(${this.gridSize}px,1fr))"></div>`;
    this.renderTrashGallery();
  },

  renderTrashGallery() {
    const grid = document.getElementById('galleryGrid');
    if (!grid) return;
    grid.innerHTML = '';

    if (this._thumbObserver) this._thumbObserver.disconnect();
    this._thumbObserver = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (!entry.isIntersecting) continue;
        const el = entry.target;
        const driveId = el.dataset.thumbId;
        if (driveId) { this.loadThumb(driveId, el); el.removeAttribute('data-thumb-id'); }
        this._thumbObserver.unobserve(el);
      }
    }, { root: document.getElementById('contentScroll'), rootMargin: '200px' });

    for (let i = 0; i < this.currentFiles.length; i++) {
      const file = this.currentFiles[i];
      const el = document.createElement('div');
      el.className = 'gallery-item trash-item';

      const cached = this.thumbCache.get(file.thumbDriveId);
      if (cached) {
        el.innerHTML = `<img src="${cached}">`;
      } else if (file.thumbDriveId) {
        el.innerHTML = `<div class="loading-placeholder"><div class="spinner"></div></div>`;
        el.dataset.thumbId = file.thumbDriveId;
      } else {
        el.innerHTML = `<div class="loading-placeholder" style="font-size:11px;">미리보기 없음</div>`;
      }

      if (file.type?.startsWith('video/')) el.innerHTML += `<div class="vid-badge">▶</div>`;

      const sizeStr = file.size ? (file.size < 1048576 ? (file.size/1024).toFixed(0)+'KB' : (file.size/1048576).toFixed(1)+'MB') : '';
      const dateStr = file.mtime ? new Date(file.mtime).toISOString().slice(0, 10) : '';
      el.innerHTML += `<div class="hover-info"><div class="hi-name">${this.esc(file.name)}</div><div class="hi-size">${sizeStr}${dateStr ? '  ·  ' + dateStr : ''}</div></div>`;

      // Restore button overlay
      el.innerHTML += `<div class="trash-restore" data-idx="${i}">↩ 복원</div>`;
      el.onclick = (e) => {
        if (e.target.closest('.trash-restore')) {
          this.restoreFile(file);
          el.remove();
        }
      };

      grid.appendChild(el);
      if (!cached && file.thumbDriveId) this._thumbObserver.observe(el);
    }
  },

  restoreFile(f) {
    this.hiddenSet.delete(f.origDriveId);
    this.hiddenData = this.hiddenData.filter(d => d.origDriveId !== f.origDriveId);
    this.currentFiles = this.currentFiles.filter(d => d.origDriveId !== f.origDriveId);
    this.originalFiles = this.originalFiles.filter(d => d.origDriveId !== f.origDriveId);
    document.getElementById('fileCount').textContent = `${this.currentFiles.length.toLocaleString()}개 파일`;
    this.saveHidden();
    this.toast('↩ 복원됨');
  },

  renderTrashPreview() {
    const grid = document.getElementById('trashGrid');
    if (!grid || !this.hiddenData.length) return;

    const items = [...this.hiddenData].reverse().slice(0, 10);
    for (const item of items) {
      const el = document.createElement('div');
      el.className = 'lucky-item trash-preview-item';
      el.innerHTML = `<div style="width:100%;height:100%;background:var(--surface2);display:flex;align-items:center;justify-content:center;"><div class="spinner"></div></div>`;
      if (item.type?.startsWith('video/')) el.innerHTML += `<div class="li-vid">▶</div>`;
      el.innerHTML += `<div class="li-badge">${this.esc(item._folderName || '')}</div>`;

      el.onclick = () => this.openTrash();
      grid.appendChild(el);

      if (item.thumbDriveId) this.loadThumbInto(item.thumbDriveId, el);
    }
    this._applyLuckyGridSize();
  },

  // ===== FAVORITES =====
  async loadFavorites() {
    try {
      const fid = await Drive.findFile('_favorites.enc', this.rootDriveId);
      if (fid) {
        this.favFileId = fid;
        this.favData = await Crypto.decryptJSON(this.key, await Drive.download(fid));
        this.favSet = new Set(this.favData.map(f => f.origDriveId));
        console.log(`즐겨찾기 ${this.favSet.size}개 로드됨`);
      }
    } catch (e) { console.error('Favorites load failed:', e); }
  },

  async saveFavorites() {
    try {
      const enc = await Crypto.encryptJSON(this.key, this.favData);
      if (this.favFileId) { await Drive.update(this.favFileId, enc); }
      else { this.favFileId = await Drive.upload('_favorites.enc', enc, this.rootDriveId); }
    } catch (e) { console.error('Favorites save failed:', e); this.toast('즐겨찾기 저장 실패'); }
  },

  async _repairFavMtime() {
    // Find favorites missing mtime
    const missing = this.favData.filter(f => !f.mtime && f._folderId && !f._folderId.startsWith('__'));
    if (!missing.length) return;

    // Group by folder
    const byFolder = {};
    for (const f of missing) {
      if (!byFolder[f._folderId]) byFolder[f._folderId] = [];
      byFolder[f._folderId].push(f);
    }

    console.log(`즐겨찾기 날짜 복구: ${missing.length}개 (${Object.keys(byFolder).length}개 폴더)`);
    let repaired = 0;

    for (const [folderId, items] of Object.entries(byFolder)) {
      try {
        const indexId = await Drive.findFile('_index.enc', folderId);
        if (!indexId) continue;
        const files = await Crypto.decryptJSON(this.key, await Drive.download(indexId));
        const lookup = new Map(files.map(f => [f.origDriveId, f]));

        for (const fav of items) {
          const orig = lookup.get(fav.origDriveId);
          if (orig?.mtime) {
            fav.mtime = orig.mtime;
            repaired++;
          }
        }
      } catch (e) { console.warn(`폴더 ${folderId} 인덱스 로드 실패:`, e); }
    }

    if (repaired > 0) {
      await this.saveFavorites();
      console.log(`즐겨찾기 날짜 복구 완료: ${repaired}개`);
    }
  },

  toggleFirstFav() {
    const f = this.currentFiles[this.lbIndex];
    if (!f) return;
    const heart = document.querySelector('#lbContent .lb-fav-btn');
    if (!heart) return;
    this.toggleFavorite(f, heart);
  },

  toggleFavorite(f, heartEl) {
    const isRemoving = this.favSet.has(f.origDriveId);
    if (isRemoving) {
      this.favSet.delete(f.origDriveId);
      this.favData = this.favData.filter(d => d.origDriveId !== f.origDriveId);
      heartEl.classList.remove('active');
    } else {
      this.favSet.add(f.origDriveId);
      this.favData.push({
        origDriveId: f.origDriveId, thumbDriveId: f.thumbDriveId,
        name: f.name, type: f.type, size: f.size, mtime: f.mtime,
        _folderId: f._folderId || this.currentFolderId,
        _folderName: f._folderName || (this.navStack.length ? this.navStack[this.navStack.length - 1].name : '')
      });
      heartEl.classList.add('active');
    }
    // Trigger center animation
    const wrap = heartEl.parentElement;
    const anim = wrap?.querySelector('.lb-heart-anim');
    if (anim) {
      anim.classList.remove('pop', 'unpop');
      void anim.offsetWidth;
      anim.classList.add(isRemoving ? 'unpop' : 'pop');
    }
    // Show fav toast inside this media wrap
    const favToast = wrap?.querySelector('.lb-fav-toast');
    if (favToast) {
      favToast.textContent = isRemoving ? '즐겨찾기 해제' : '❤ 즐겨찾기 추가';
      favToast.style.opacity = '1';
      clearTimeout(favToast._timer);
      favToast._timer = setTimeout(() => favToast.style.opacity = '0', 1500);
    }
    this.saveFavorites();
    this.updateFavBadges();
  },

  updateFavBadges() {
    document.querySelectorAll('#galleryGrid .gallery-item').forEach(el => {
      const existing = el.querySelector('.fav-badge');
      const idx = parseInt(el.dataset.idx);
      const file = this.currentFiles[idx];
      if (file && this.favSet.has(file.origDriveId)) {
        if (!existing) { const b = document.createElement('div'); b.className='fav-badge'; b.textContent='❤'; el.appendChild(b); }
      } else {
        if (existing) existing.remove();
      }
    });
  },

  renderFavGrid() {
    const grid = document.getElementById('favGrid');
    if (!grid || !this.favData.length) return;

    // Show most recent first, limit to 10 for preview
    const items = [...this.favData].reverse().slice(0, 10);
    for (const item of items) {
      const el = document.createElement('div');
      el.className = 'lucky-item';
      el.innerHTML = `<div style="width:100%;height:100%;background:var(--surface2);display:flex;align-items:center;justify-content:center;"><div class="spinner"></div></div>`;
      if (item.type?.startsWith('video/')) el.innerHTML += `<div class="li-vid">▶</div>`;
      el.innerHTML += `<div class="fav-badge">❤</div>`;
      el.innerHTML += `<div class="li-badge">${this.esc(item._folderName || '')}</div>`;

      el.onclick = () => this.openFavorites();
      grid.appendChild(el);

      if (item.thumbDriveId) this.loadThumbInto(item.thumbDriveId, el);
    }
    this._applyLuckyGridSize();
  },

  // ===== SWIPE =====
  onTouchStart(e) {
    this.touchStartX = e.touches[0].clientX;
    this.touchStartY = e.touches[0].clientY;
  },

  onTouchEnd(e) {
    const dx = e.changedTouches[0].clientX - this.touchStartX;
    const dy = e.changedTouches[0].clientY - this.touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);

    // Must be horizontal swipe, min 50px, more horizontal than vertical
    if (absDx < 50 || absDy > absDx) return;

    if (dx > 0) { this.lbNav(-1); }  // swipe right = previous
    else { this.lbNav(1); }           // swipe left = next
  },

  // ===== MONTH FILTER =====
  toggleMonthPicker() {
    const panel = document.getElementById('monthPickerPanel');
    const btn = document.getElementById('monthPickerBtn');
    if (!panel) return;
    const isOpen = panel.classList.contains('open');
    if (isOpen) {
      panel.classList.remove('open');
      if (btn) btn.classList.remove('active');
    } else {
      this._buildMonthPicker(panel);
      panel.classList.add('open');
      if (btn) btn.classList.add('active');
    }
  },

  _buildMonthPicker(panel) {
    const base = this._preMonthFiles.length ? this._preMonthFiles : this.currentFiles;
    const monthMap = new Map();
    for (const f of base) {
      if (!f.mtime) continue;
      const d = new Date(f.mtime);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (!monthMap.has(key)) monthMap.set(key, { label: `${d.getFullYear()}년 ${d.getMonth()+1}월`, count: 0 });
      monthMap.get(key).count++;
    }
    const months = [...monthMap.entries()].sort((a, b) => b[0].localeCompare(a[0]));
    if (!months.length) {
      panel.innerHTML = '<div style="padding:12px;color:var(--text2);font-size:13px;text-align:center;">날짜 정보 없음</div>';
      return;
    }
    let h = '<div style="padding:4px 8px 6px;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:0.5px;">연/월 필터</div>';
    if (this._monthFilter) {
      h += `<div class="month-picker-item" onclick="app.setMonthFilter(null)" style="color:var(--text2);margin-bottom:4px;border-bottom:1px solid var(--border);border-radius:0;padding-bottom:10px;">
        <span style="display:flex;align-items:center;gap:7px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>전체 보기</span>
      </div>`;
    }
    for (const [key, { label, count }] of months) {
      const isActive = this._monthFilter === key;
      h += `<div class="month-picker-item${isActive ? ' active' : ''}" onclick="app.setMonthFilter('${key}')">
        <span>${label}</span>
        <span style="font-size:11px;opacity:0.7;">${count.toLocaleString()}개</span>
      </div>`;
    }
    panel.innerHTML = h;
  },

  setMonthFilter(monthKey) {
    const base = this._preMonthFiles.length ? this._preMonthFiles : [...this.currentFiles];
    this._monthFilter = monthKey || null;
    // Close picker
    const panel = document.getElementById('monthPickerPanel');
    const btn = document.getElementById('monthPickerBtn');
    if (panel) panel.classList.remove('open');
    if (btn) { btn.classList.remove('active'); btn.classList.toggle('filtered', !!this._monthFilter); }

    if (this._monthFilter) {
      this._preMonthFiles = base;
      this.originalFiles = base;
      this.currentFiles = base.filter(f => {
        if (!f.mtime) return false;
        const d = new Date(f.mtime);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` === this._monthFilter;
      });
    } else {
      this.currentFiles = base;
      this.originalFiles = base;
      this._preMonthFiles = [];
    }
    document.getElementById('fileCount').textContent = `${this.currentFiles.length.toLocaleString()}개 파일`;
    this.renderGallery();
    this._updateMonthFilterChip();
  },

  _updateMonthFilterChip() {
    const toolbar = document.getElementById('toolbar');
    if (!toolbar) return;
    let chip = document.getElementById('monthFilterChip');
    if (this._monthFilter) {
      const [y, m] = this._monthFilter.split('-');
      const label = `${y}년 ${parseInt(m)}월`;
      if (!chip) {
        chip = document.createElement('div');
        chip.id = 'monthFilterChip';
        chip.className = 'month-filter-chip';
        toolbar.insertBefore(chip, toolbar.firstChild);
      }
      chip.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${label}<span onclick="app.setMonthFilter(null)" style="cursor:pointer;opacity:0.65;font-size:15px;line-height:1;padding:0 2px;" title="필터 해제">✕</span>`;
    } else {
      if (chip) chip.remove();
    }
  },

  esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
};

// Fullscreen change listener
document.addEventListener('fullscreenchange', () => {
  app.updateFSBtn();
  // Re-layout multi-view after fullscreen transition
  if (app.viewCount > 1) {
    setTimeout(() => {
      const c = document.getElementById('lbContent');

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (document.getElementById('lightbox').classList.contains('active')) {
    if(e.key==='Escape') {
      if (document.fullscreenElement) { document.exitFullscreen(); }
      else { history.back(); }
    }
    if(e.key==='ArrowLeft'||e.key==='PageUp') { app.lbNav(-1); }
    if(e.key==='ArrowRight'||e.key==='PageDown') { app.lbNav(1); }
    if(e.key==='ArrowUp') { e.preventDefault(); app.lbRandom(); }
    if(e.key==='ArrowDown') { e.preventDefault(); app.lbRandom(); }
    if(e.key===' ') { e.preventDefault(); document.querySelectorAll('#lbContent video').forEach(v=>{v.paused?v.play():v.pause();}); }
    if(e.key==='s'||e.key==='S') { app.toggleSlideshow(); }
    if(e.key==='f'||e.key==='F'||e.key==='Enter') { e.preventDefault(); app.toggleFullscreen(); }
    if(e.key==='d'||e.key==='D') { app.setViewCount(app.viewCount === 2 ? 1 : 2); }
    if(e.key==='t'||e.key==='T') { app.setViewCount(app.viewCount === 3 ? 1 : 3); }
    if(e.key==='1'||e.code==='Digit1') { app.setViewCount(1); }
    if(e.key==='2'||e.code==='Digit2') { app.setViewCount(2); }
    if(e.key==='3'||e.code==='Digit3') { app.setViewCount(3); }
    if(e.key==='b'||e.key==='B') { app.toggleFirstFav(); }
    if(e.key==='Delete') { app.hideCurrentFile(); }
  }
});

// ===== MOUSE WHEEL =====
let _wheelLast = 0;
document.getElementById('lbBody')?.addEventListener('wheel', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  const now = Date.now();
  if (now - _wheelLast < 250) return;
  _wheelLast = now;
  e.preventDefault();
  if (e.deltaY > 0) { app.lbNav(1); }
  else if (e.deltaY < 0) { app.lbNav(-1); }
}, { passive: false });

// ===== SWIPE =====
document.getElementById('lbBody')?.addEventListener('touchstart', e => app.onTouchStart(e), {passive:true});
document.getElementById('lbBody')?.addEventListener('touchend', e => app.onTouchEnd(e));

document.getElementById('lbBody')?.addEventListener('mousedown', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.button === 1) { e.preventDefault(); app.toggleFullscreen(); }
});
// Prevent middle-click scroll icon
document.getElementById('lbBody')?.addEventListener('auxclick', e => { if (e.button === 1) e.preventDefault(); });

// ===== FULLSCREEN EDGE NAV =====
document.getElementById('lightbox')?.addEventListener('mousemove', e => {
  if (!document.fullscreenElement) return;
  const w = window.innerWidth;
  const h = window.innerHeight;
  const prev = document.querySelector('.lb-nav.prev');
  const next = document.querySelector('.lb-nav.next');
  const top = document.querySelector('.lb-top');
  const bot = document.querySelector('.lb-bottom');
  if (prev) prev.classList.toggle('edge-hover', e.clientX < 60);
  if (next) next.classList.toggle('edge-hover', e.clientX > w - 60);
  if (top) top.classList.toggle('edge-show', e.clientY < 50);
  const ssPanelOpen = document.getElementById('ssPanel')?.classList.contains('open');
  if (bot) bot.classList.toggle('edge-show', e.clientY > h - 50 || ssPanelOpen);
});

document.getElementById('passwordInput')?.addEventListener('keydown', e => { if(e.key==='Enter') app.login(); });

  const savedPw = sessionStorage.getItem('sg_pw');
  if (savedPw) {
    document.getElementById('passwordInput').value = savedPw;
    app.login();
  }
})();

// Hide fullscreen button if not supported (iOS Safari)
if (!document.documentElement.requestFullscreen && !document.documentElement.webkitRequestFullscreen) {
  const fsBtn = document.getElementById('lbFSBtn');
  if (fsBtn) fsBtn.style.display = 'none';
}

// ===== SCROLL TO TOP BUTTON =====
(function() {
  const scroll = document.getElementById('contentScroll');
  const btn = document.getElementById('scrollTopBtn');
  if (!scroll || !btn) return;
  scroll.addEventListener('scroll', () => {
    btn.classList.toggle('show', scroll.scrollTop > 200);
  });
})();

// ===== BROWSER HISTORY =====
window.addEventListener('popstate', e => {
  // Lightbox open? Just close it
  if (document.getElementById('lightbox').classList.contains('active')) {
    app.closeLightbox();
    return;
  }
  const s = e.state;
  // No state = initial page, do nothing (or user leaves site)
  if (!s) return;
  // Stale lightbox entry (lightbox not open but state says lightbox) → skip
  if (s.view === 'lightbox') { history.back(); return; }
  app._skipHistory = true;
  try {
    if (s.view === 'folder') {
      app.navStack = s.navStack || [];
      app.navTo(s.folderId, s.folderName);
    } else if (s.view === 'favorites') {
      app.openFavorites();
    } else if (s.view === 'random1000') {
      app.openRandom1000();
    } else if (s.view === 'trash') {
      app.openTrash();
    }
    // Restore scroll position
    if (s.restoreIdx != null) {
      setTimeout(() => app.scrollToItem(s.restoreIdx), 100);
    } else if (s.restoreScrollTop != null) {
      // Main page needs longer delay (async content loading)
      const tryRestore = () => {
        const scroll = document.getElementById('contentScroll');
        if (scroll && scroll.scrollHeight > scroll.clientHeight) {
          scroll.scrollTop = s.restoreScrollTop;
        } else {
          setTimeout(tryRestore, 100);
        }
      };
      setTimeout(tryRestore, 200);
    }
  } finally {
    app._skipHistory = false;
  }
});
</script>
</body>
</html>
