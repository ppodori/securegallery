<script>
const CONFIG = {
  CLIENT_ID: '914768806134-ur8saf3irah9l9maqk6g5mb1mgif8urg.apps.googleusercontent.com',
  SCOPES: 'https://www.googleapis.com/auth/drive.file',
  ROOT_NAME: 'SecureGallery',
  PBKDF2_ITERATIONS: 600000,
};

// ============================================================
// Crypto
// ============================================================
const Crypto = {
  async deriveKey(pw, salt) {
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:CONFIG.PBKDF2_ITERATIONS,hash:'SHA-256'}, km, {name:'AES-GCM',length:256}, false, ['encrypt','decrypt']);
  },
  async decrypt(key, data) {
    const b = new Uint8Array(data);
    return crypto.subtle.decrypt({name:'AES-GCM',iv:b.slice(0,12)}, key, b.slice(12));
  },
  async encrypt(key, data) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const buf = typeof data === 'string' ? new TextEncoder().encode(data) : data;
    const enc = await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, buf);
    const out = new Uint8Array(12 + enc.byteLength); out.set(iv); out.set(new Uint8Array(enc), 12);
    return out.buffer;
  },
  async decryptJSON(key, data) {
    return JSON.parse(new TextDecoder().decode(await this.decrypt(key, data)));
  },
  async encryptJSON(key, obj) {
    return this.encrypt(key, JSON.stringify(obj));
  },
  fromB64(s) { const b=atob(s),a=new Uint8Array(b.length); for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i); return a.buffer; }
};

// ============================================================
// Drive
// ============================================================
const Drive = {
  token: null,
  hdr() { return {Authorization:`Bearer ${this.token}`}; },
  async _fetch(url, opts = {}) {
    opts.headers = { ...opts.headers, ...this.hdr() };
    let r = await fetch(url, opts);
    if (r.status === 401) {
      // Token expired, try silent refresh
      try { await app._silentRefresh(); } catch {}
      opts.headers = { ...opts.headers, ...this.hdr() };
      r = await fetch(url, opts);
    }
    return r;
  },
  async listFolders(parentId) {
    const q = `'${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`;
    const r = await this._fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)&pageSize=200`);
    if (!r.ok) throw new Error(`Drive ${r.status}`);
    const files = (await r.json()).files || [];
    return files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
  },
  async findFile(name, parentId) {
    const q = `name='${name}' and '${parentId}' in parents and trashed=false`;
    const r = await this._fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)&pageSize=1`);
    if (!r.ok) throw new Error(`Drive ${r.status}`);
    return ((await r.json()).files || [])[0]?.id || null;
  },
  async findFolderByName(name, parentId) {
    const q = `name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`;
    const r = await this._fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)&pageSize=1`);
    if (!r.ok) return null;
    return ((await r.json()).files || [])[0]?.id || null;
  },
  async download(fileId) {
    const r = await this._fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
    if (!r.ok) throw new Error(`Download ${r.status}`);
    return r.arrayBuffer();
  },
  async upload(name, data, parentId) {
    const fd = new FormData();
    fd.append('metadata', new Blob([JSON.stringify({name, parents:[parentId]})], {type:'application/json'}));
    fd.append('file', new Blob([data], {type:'application/octet-stream'}));
    const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
      method:'POST', headers:{Authorization:`Bearer ${this.token}`}, body:fd
    });
    if (!r.ok) throw new Error(`Upload ${r.status}`);
    return (await r.json()).id;
  },
  async update(fileId, data) {
    const r = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
      method:'PATCH', headers:{Authorization:`Bearer ${this.token}`,'Content-Type':'application/octet-stream'}, body:data
    });
    if (!r.ok) throw new Error(`Update ${r.status}`);
  }
};

  _saveScrollToHistory() {
    const scroll = document.getElementById('contentScroll');
    if (!scroll || !history.state) return;
    const grid = document.getElementById('galleryGrid');
    if (grid) {
      // Gallery view: save item index
      const items = grid.querySelectorAll('.gallery-item');
      let visibleIdx = 0;
      const scrollTop = scroll.getBoundingClientRect().top;
      for (const item of items) {
        if (item.getBoundingClientRect().top >= scrollTop) {
          visibleIdx = parseInt(item.dataset.idx) || 0;
          break;
        }
      }
      history.replaceState({ ...history.state, restoreIdx: visibleIdx }, '');
    } else {
      // Main page: save raw scrollTop
      history.replaceState({ ...history.state, restoreScrollTop: scroll.scrollTop }, '');
    }
  },

  // ===== AUTH =====
  async login() {
    const pw = document.getElementById('passwordInput').value;
    if (!pw) return this.showError('비밀번호를 입력하세요.');
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = '인증 중...';
    try {
      await this.auth();
      btn.textContent = 'Drive 연결 중...';
      this.rootDriveId = await Drive.findFolderByName(CONFIG.ROOT_NAME, 'root');
      if (!this.rootDriveId) {
        // Cached token might be invalid, force re-auth
        localStorage.removeItem('sg_token');
        localStorage.removeItem('sg_token_expiry');
        await this.auth(true);
        this.rootDriveId = await Drive.findFolderByName(CONFIG.ROOT_NAME, 'root');
      }
      if (!this.rootDriveId) { btn.disabled=false; btn.textContent='시작하기'; return this.showError('SecureGallery 폴더가 Drive에 없습니다.'); }
      btn.textContent = '암호화 키 확인 중...';
      const configId = await Drive.findFile('config.json', this.rootDriveId);
      if (!configId) { btn.disabled=false; btn.textContent='시작하기'; return this.showError('config.json을 찾을 수 없습니다.'); }
      const config = JSON.parse(new TextDecoder().decode(await Drive.download(configId)));
      this.key = await Crypto.deriveKey(pw, new Uint8Array(Crypto.fromB64(config.salt)));
      sessionStorage.setItem('sg_pw', pw);
      await this.loadHidden();
      await this.loadFavorites();
      this._repairFavMtime(); // background, non-blocking
      await this.buildTree(this.rootDriveId);
      this.navStack = [];
      this.navTo(this.rootDriveId, CONFIG.ROOT_NAME);
    } catch (e) {
      console.error(e); btn.disabled=false; btn.textContent='시작하기';
      this.showError('연결 실패: ' + e.message);
    }
  },

  auth(force) {
    return new Promise((res, rej) => {
      // Check saved token
      if (!force) {
        const saved = localStorage.getItem('sg_token');
        const expiry = localStorage.getItem('sg_token_expiry');
        if (saved && expiry && Date.now() < parseInt(expiry)) {
          Drive.token = saved;
          this._scheduleRefresh(parseInt(expiry));
          return res();
        }
      }
      const ck = () => {
        if (typeof google === 'undefined' || !google.accounts) return setTimeout(ck, 100);
        this._tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CONFIG.CLIENT_ID, scope: CONFIG.SCOPES,
          callback: r => {
            if(r.error) return rej(new Error(r.error));
            this._setToken(r);
            res();
          },
          error_callback: e => rej(new Error(e.message||'Auth failed'))
        });
        this._tokenClient.requestAccessToken();
      };
      ck();
    });
  },

  _setToken(r) {
    Drive.token = r.access_token;
    const expiry = Date.now() + (r.expires_in || 3600) * 1000;
    localStorage.setItem('sg_token', r.access_token);
    localStorage.setItem('sg_token_expiry', String(expiry));
    this._scheduleRefresh(expiry);
  },

  _scheduleRefresh(expiry) {
    if (this._refreshTimer) clearTimeout(this._refreshTimer);
    // Refresh 5 minutes before expiry
    const delay = Math.max(0, expiry - Date.now() - 5 * 60 * 1000);
    this._refreshTimer = setTimeout(() => this._silentRefresh(), delay);
  },

  async _silentRefresh() {
    try {
      if (!this._tokenClient) {
        if (typeof google === 'undefined' || !google.accounts) return;
        this._tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CONFIG.CLIENT_ID, scope: CONFIG.SCOPES,
          callback: () => {},
          error_callback: () => {}
        });
      }
      await new Promise((res, rej) => {
        this._tokenClient.callback = r => {
          if (r.error) return rej(new Error(r.error));
          this._setToken(r);
          console.log('토큰 자동 갱신 완료');
          res();
        };
        this._tokenClient.error_callback = e => rej(e);
        this._tokenClient.requestAccessToken({ prompt: '' });
      });
    } catch (e) {
      console.warn('토큰 자동 갱신 실패:', e);
    }
  },

  logout() {
    if (this._refreshTimer) clearTimeout(this._refreshTimer);
    Drive.token=null; this.key=null; this.treeCache={};
    localStorage.removeItem('sg_token');
    localStorage.removeItem('sg_token_expiry');
    localStorage.removeItem('sg_lucky');
    localStorage.removeItem('sg_r1000');
    sessionStorage.removeItem('sg_pw');
    this.thumbCache.forEach(u=>URL.revokeObjectURL(u)); this.thumbCache.clear();
    this._thumbCacheOrder = []; this._thumbQueue = []; this._thumbLoading = 0;
    document.getElementById('passwordInput').value='';
    this.showScreen('loginScreen');
    document.getElementById('loginBtn').disabled=false;
    document.getElementById('loginBtn').textContent='시작하기';
  },

  // ===== SIDEBAR TREE =====
  async buildTree(rootId) {
    const subs = await Drive.listFolders(rootId);
    this.treeCache[rootId] = subs.filter(f => f.name !== 'index' && f.name !== 'thumbs' && f.name !== 'files');
    // Pre-load 0_MOV children for grouped display
    const movFolder = this.treeCache[rootId].find(f => f.name === '0_MOV');
    if (movFolder) {
      this.treeCache[movFolder.id] = await Drive.listFolders(movFolder.id);
    }
  },

  _buildNavStack(targetId, rootId) {
    // BFS through treeCache to find path
    const path = [];
    const find = (parentId, trail) => {
      const children = this.treeCache[parentId];
      if (!children) return false;
      for (const child of children) {
        const newTrail = [...trail, {id: child.id, name: child.name}];
        if (child.id === targetId) { path.push(...newTrail); return true; }
        if (find(child.id, newTrail)) return true;
      }
      return false;
    };
    find(rootId, []);
    return path;
  },

  // ===== NAVIGATION =====
  async navTo(folderId, folderName) {
    this.currentFolderId = folderId;
    this.currentFiles = [];
    this.stopSlideshow(true);
    // Clear preload cache on folder change
    if (this.bgPreloadAbort) this.bgPreloadAbort.abort = true;
    if (this._thumbObserver) this._thumbObserver.disconnect();
    if (this._spacerObs) { this._spacerObs.disconnect(); this._spacerObs = null; }
    this._spacerEndIdx = 0;
    this._thumbQueue = [];
    this.preloadCache.forEach(u => URL.revokeObjectURL(u));
    this.preloadCache.clear();

    if (folderId === this.rootDriveId) this.navStack = [];
    this.shuffled = false;
    this.selectedSet.clear(); this._lastSelectedIdx = -1;
    this.originalFiles = [];
    this._monthFilter = null; this._preMonthFiles = [];
    const _mChip = document.getElementById('monthFilterChip'); if (_mChip) _mChip.remove();
    const _mPanel = document.getElementById('monthPickerPanel'); if (_mPanel) _mPanel.classList.remove('open');
    const _mBtn = document.getElementById('monthPickerBtn'); if (_mBtn) { _mBtn.classList.remove('active'); _mBtn.classList.remove('filtered'); }
    this._favMode = false;
    this._trashMode = false;
    this._currentSort = 'date_asc';
    this._favFilter = 'all';
    this._orientFilter = 'all';
    this._favStatusFilter = 'all';
    this._folderFilesCache = null;
    const filterDiv = document.getElementById('favFilterDiv');
    if (filterDiv) filterDiv.style.display = 'none';
    const sortAddedBtn = document.getElementById('sortAddedBtn');
    if (sortAddedBtn) sortAddedBtn.style.display = 'none';
    const nameArrow = document.getElementById('sortNameArrow');
    const sizeArrow = document.getElementById('sortSizeArrow');
    const dateArrow = document.getElementById('sortDateArrow');
    if (nameArrow) nameArrow.textContent = '↑';
    if (sizeArrow) sizeArrow.textContent = '↑';
    if (dateArrow) dateArrow.textContent = '↑';

    this.showScreen('mainScreen');
    this.renderBreadcrumb();
    if (!this._skipHistory) {
      this._saveScrollToHistory();
      const state = { view: 'folder', folderId, folderName, navStack: JSON.parse(JSON.stringify(this.navStack)) };
      if (folderId === this.rootDriveId && !this._hasInitialState) {
        history.replaceState(state, '');
        this._hasInitialState = true;
      } else {
        history.pushState(state, '');
      }
    }

    const area = document.getElementById('contentArea');
    area.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';
    document.getElementById('toolbar').style.display = 'none';

    try {
      // Subfolders
      if (!this.treeCache[folderId]) {
        this.treeCache[folderId] = await Drive.listFolders(folderId);
      }
      const subfolders = folderId === this.rootDriveId
        ? (this.treeCache[folderId] || []).filter(f => f.name !== 'index' && f.name !== 'thumbs' && f.name !== 'files')
        : (this.treeCache[folderId] || []);

      // Index
      const indexId = await Drive.findFile('_index.enc', folderId);
      let files = [];
      if (indexId) {
        try {
          const allFiles = await Crypto.decryptJSON(this.key, await Drive.download(indexId));
          files = allFiles.filter(f => !this.hiddenSet.has(f.origDriveId));
          // Auto-sort by date (oldest first)
          files.sort((a, b) => {
            const at = a.mtime || 0, bt = b.mtime || 0;
            if (!at && !bt) return 0;
            if (!at) return 1;
            if (!bt) return -1;
            return at - bt;
          });
          this.currentFiles = files;
        } catch (e) { console.error(e); this.toast('인덱스 복호화 실패'); }
      }

      this.renderView(subfolders, files);
    } catch (e) {
      console.error(e);
      area.innerHTML = `<div class="empty-state">❌ ${this.esc(e.message)}</div>`;
    }
  },

  renderBreadcrumb() {
    const bc = document.getElementById('breadcrumb');
    if (!this.navStack.length) { bc.innerHTML = ''; return; }
    let h = '';
    for (let i = 0; i < this.navStack.length; i++) {
      const item = this.navStack[i];
      if (i > 0) h += `<span class="sep">›</span>`;
      h += i === this.navStack.length - 1
        ? `<span class="current">${this.esc(item.name)}</span>`
        : `<a href="#" onclick="app.goTo(${i});return false;">${this.esc(item.name)}</a>`;
    }
    bc.innerHTML = h;
  },

  // ===== GALLERY =====
  renderGallery() {
    const grid = document.getElementById('galleryGrid');
    if (!grid) return;
    grid.innerHTML = '';
    const gridSlider = document.getElementById('gridSlider');
    if (gridSlider) gridSlider.value = this.gridSize;
    const BATCH = this._isMobile ? 30 : 50;
    this._galleryLoaded = 0;
    this._lastRenderedMonth = null;

    // Lazy thumb observer
    if (this._thumbObserver) this._thumbObserver.disconnect();
    const rootMargin = this._isMobile ? '50px' : '150px';
    this._thumbObserver = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (!entry.isIntersecting) continue;
        const el = entry.target;
        const driveId = el.dataset.thumbId;
        if (driveId) { this.loadThumb(driveId, el); el.removeAttribute('data-thumb-id'); }
        this._thumbObserver.unobserve(el);
      }
    }, { root: document.getElementById('contentScroll'), rootMargin });

    this._galleryLoadBatch = () => {
      const end = Math.min(this._galleryLoaded + BATCH, this.currentFiles.length);
      const frag = document.createDocumentFragment();
      const toObserve = [];
      const showDateSep = this._currentSort === 'date_asc' || this._currentSort === 'date_desc';
      for (let i = this._galleryLoaded; i < end; i++) {
        const file = this.currentFiles[i];
        // Date separator
        if (showDateSep) {
          const monthKey = file.mtime
            ? `${new Date(file.mtime).getFullYear()}-${String(new Date(file.mtime).getMonth()+1).padStart(2,'0')}`
            : '__none__';
          if (monthKey !== this._lastRenderedMonth) {
            this._lastRenderedMonth = monthKey;
            const sep = document.createElement('div');
            sep.className = 'date-sep';
            if (file.mtime) {
              const d = new Date(file.mtime);
              sep.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${d.getFullYear()}년 ${d.getMonth()+1}월`;
            } else {
              sep.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>날짜 없음`;
            }
            frag.appendChild(sep);
          }
        }
        const el = document.createElement('div');
        el.className = 'gallery-item' + (this.selectedSet.has(file.origDriveId) ? ' selected' : '');
        el.dataset.idx = i;
        el.onclick = (e) => {
          if (e.target.closest('.sel-check')) return;
          this.openLightbox(i);
        };
        const cached = this.thumbCache.get(file.thumbDriveId);
        let ih = cached ? `<img src="${cached}">` : `<div class="loading-placeholder"><div class="spinner"></div></div>`;
        if (file.type?.startsWith('video/')) ih += `<div class="vid-badge">▶</div>`;
        if (this.favSet.has(file.origDriveId)) ih += `<div class="fav-badge">❤</div>`;
        if (file._folderName) {
          const dateTag = file.mtime ? `<span style="opacity:0.6;margin-left:4px">${new Date(file.mtime).toISOString().slice(0,10)}</span>` : '';
          ih += `<div class="li-badge">${this.esc(file._folderName)}${dateTag}</div>`;
        }
        const sizeStr = file.size ? (file.size < 1048576 ? (file.size/1024).toFixed(0)+'KB' : (file.size/1048576).toFixed(1)+'MB') : '';
        const dateStr = file.mtime ? new Date(file.mtime).toISOString().slice(0, 10) : '';
        ih += `<div class="hover-info"><div class="hi-name">${this.esc(file.name)}</div><div class="hi-size">${sizeStr}${dateStr ? '  ·  ' + dateStr : ''}</div></div>`;
        ih += `<div class="sel-check" onclick="event.stopPropagation();app.toggleSelect(${i},event.shiftKey)"></div>`;
        el.innerHTML = ih;
        if (!cached) { el.dataset.thumbId = file.thumbDriveId; toObserve.push(el); }
        frag.appendChild(el);
      }
      grid.appendChild(frag);
      for (const el of toObserve) this._thumbObserver.observe(el);
      this._galleryLoaded = end;
      if (this._galleryLoaded < this.currentFiles.length) {
        const obs = new IntersectionObserver(entries => {
          if (entries[0].isIntersecting) { obs.disconnect(); this._galleryLoadBatch(); }
        });
        obs.observe(grid.lastElementChild);
      }
    };
    this._galleryLoadBatch();
  },

  async loadThumb(driveId, el) {
    if (!driveId) return;
    // Queue-based: add to queue and process
    this._thumbQueue.push({ driveId, el });
    this._processThumbQueue();
  },

  async _processThumbQueue() {
    while (this._thumbQueue.length > 0 && this._thumbLoading < this._thumbConcurrency) {
      const item = this._thumbQueue.shift();
      // Skip disconnected elements (user navigated away)
      if (!item.el.isConnected) continue;
      // Skip gallery items that scrolled far out of view
      if (!item.isPreview && item.el.dataset.idx) {
        const rect = item.el.getBoundingClientRect();
        const viewH = window.innerHeight;
        if (rect.top > viewH + 800 || rect.bottom < -800) {
          // Re-add thumbId so observer can re-trigger later
          if (item.driveId && !this.thumbCache.has(item.driveId)) {
            item.el.dataset.thumbId = item.driveId;
            this._thumbObserver?.observe(item.el);
          }
          continue;
        }
      }
      this._thumbLoading++;
      this._loadThumbItem(item.driveId, item.el, item.isPreview).finally(() => {
        this._thumbLoading--;
        this._processThumbQueue();
      });
    }
  },

  async _loadThumbItem(driveId, el, isPreview) {
    try {
      let url = this.thumbCache.get(driveId);
      if (!url) {
        url = URL.createObjectURL(new Blob([await Crypto.decrypt(this.key, await Drive.download(driveId))], {type:'image/jpeg'}));
        this._setThumbCache(driveId, url);
      }
      if (isPreview) {
        const img = document.createElement('img');
        img.src = url;
        const placeholder = el.querySelector('div:first-child');
        if (placeholder && !placeholder.classList.contains('li-badge') && !placeholder.classList.contains('li-vid')) {
          el.insertBefore(img, el.firstChild);
          placeholder.remove();
        }
      } else {
        const ph = el.querySelector('.loading-placeholder');
        if (ph) { const img = document.createElement('img'); img.src = url; el.insertBefore(img, ph); ph.remove(); }
      }
    } catch {}
  },

  _setThumbCache(driveId, url) {
    if (this.thumbCache.has(driveId)) {
      this._thumbCacheOrder = this._thumbCacheOrder.filter(k => k !== driveId);
    }
    this.thumbCache.set(driveId, url);
    this._thumbCacheOrder.push(driveId);
    // Evict oldest from map (don't revoke - displayed images still need the URL)
    while (this._thumbCacheOrder.length > this.THUMB_CACHE_LIMIT) {
      const oldest = this._thumbCacheOrder.shift();
      this.thumbCache.delete(oldest);
    }
  },

  setGridSize(v) {
    this.gridSize = parseInt(v);
    localStorage.setItem('sg_gridSize', v);
    const grid = document.getElementById('galleryGrid');
    if (grid) grid.style.gridTemplateColumns = `repeat(auto-fill,minmax(${v}px,1fr))`;
    const luckySlider = document.getElementById('luckySlider');
    if (luckySlider) luckySlider.value = v;
  },

  setLuckyGridSize(v) {
    this.gridSize = parseInt(v);
    localStorage.setItem('sg_gridSize', v);
    document.querySelectorAll('.lucky-grid').forEach(g => {
      g.style.gridTemplateColumns = `repeat(auto-fill,minmax(${v}px,1fr))`;
    });
    const gridSlider = document.getElementById('gridSlider');
    if (gridSlider) gridSlider.value = v;
  },

  _applyLuckyGridSize() {
    if (this.gridSize !== 160) {
      document.querySelectorAll('.lucky-grid').forEach(g => {
        g.style.gridTemplateColumns = `repeat(auto-fill,minmax(${this.gridSize}px,1fr))`;
      });
    }
  },

  // ===== LIGHTBOX =====
  async openLightbox(i) {
    this.lbIndex = i;
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
    this.closeSSPanel();
    if (!this._skipHistory) { this._saveScrollToHistory(); history.pushState({ view: 'lightbox' }, ''); }
    await this.showLBItem(i);
  },

  closeLightbox(skipScroll) {
    ++this._showVer;
    this.stopSlideshow(true);
    if (this.bgPreloadAbort) this.bgPreloadAbort.abort = true;
    if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
    this._stopAllMedia();
    document.getElementById('lbContent').innerHTML = '';
    if (!skipScroll) {
      const idx = this.lbIndex;
      setTimeout(() => this.scrollToItem(idx), 50);
    }
  },

  async lbNav(d) {
    const step = this.viewCount > 1 ? d * this.viewCount : d;
    const n = this.lbIndex + step;
    if (n < 0 || n >= this.currentFiles.length) {
      if (this.ssRunning) this.stopSlideshow(true);
      return;
    }
    // Reset slideshow timer on manual nav (don't stop)
    if (this.ssRunning) {
      clearTimeout(this.ssTimer);
      this.ssTimer = null;
    }
    this.lbIndex = n;
    await this.showLBItem(n);
    // Restart slideshow timer from new position
    if (this.ssRunning) this.ssScheduleNext();
  },

  async showLBItem(i) {
    const ver = ++this._showVer;
    const c = document.getElementById('lbContent');

    // Stop videos IMMEDIATELY before fade wait
    this._stopAllMedia();

    // Fade out current content
    c.classList.add('fade-out');
    await new Promise(r => setTimeout(r, 200));
    if (ver !== this._showVer) return;

    c.innerHTML = '';
    const modeClass = this.viewCount === 3 ? 'triple' : this.viewCount === 2 ? 'dual' : '';
    c.className = (modeClass + ' fade-out').trim();

    const f = this.currentFiles[i];
    if (!f) return;

    if (this.viewCount > 1) {
      const extras = [];
      for (let n = 1; n < this.viewCount; n++) {
        const ef = this.currentFiles[i + n];
        if (ef) extras.push(ef);
      }
      const allFiles = [f, ...extras.filter(Boolean)];
      const namesParts = allFiles.map(file => {
        const fn = file._folderName || (this.navStack.length ? this.navStack[this.navStack.length - 1].name : '');
        const tag = fn ? `<span style="color:var(--accent)">${this.esc(fn)}</span>› ` : '';
        return tag + this.esc(file.name);
      });
      document.getElementById('lbFilename').innerHTML = namesParts.join('  |  ');
      document.getElementById('lbCounter').textContent = `${(i+1).toLocaleString()}-${(i+extras.length+1).toLocaleString()} / ${this.currentFiles.length.toLocaleString()}`;

      try {
        // Load all media elements in parallel
        const allFiles = [f, ...extras];
        const elements = await Promise.all(allFiles.map(file => this._makeMediaEl(file)));
        if (ver !== this._showVer) return;

        for (const el of elements) c.appendChild(el);

        requestAnimationFrame(() => { this._layoutMultiView(c); requestAnimationFrame(() => c.classList.remove('fade-out')); });
        this._playAllMedia();
        this.preloadNext(i);
      } catch(e) { if (ver === this._showVer) { c.innerHTML='<p style="color:var(--danger);">복호화 실패</p>'; c.classList.remove('fade-out'); } }
    } else {
      const folderName = f._folderName || (this.navStack.length ? this.navStack[this.navStack.length - 1].name : '');
      const folderTag = folderName ? `<span style="color:var(--accent);margin-right:6px">${this.esc(folderName)}</span>›  ` : '';
      document.getElementById('lbFilename').innerHTML = folderTag + this.esc(f.name);
      document.getElementById('lbCounter').textContent = `${(i+1).toLocaleString()} / ${this.currentFiles.length.toLocaleString()}`;

      try {
        const el = await this._makeMediaEl(f);
        if (ver !== this._showVer) return;
        c.appendChild(el);

        requestAnimationFrame(() => requestAnimationFrame(() => c.classList.remove('fade-out')));
        this._playAllMedia();
        this.preloadNext(i);
      } catch(e) { if (ver === this._showVer) { c.innerHTML='<p style="color:var(--danger);">복호화 실패</p>'; c.classList.remove('fade-out'); } }
    }
  },

  async _makeMediaEl(f) {
    const wasCached = this.preloadCache.has(f.origDriveId);
    let url = this.preloadCache.get(f.origDriveId);
    if (!url) {
      const blob = new Blob([await Crypto.decrypt(this.key, await Drive.download(f.origDriveId))], {type:f.type});
      url = URL.createObjectURL(blob);
      this.preloadCache.set(f.origDriveId, url);
    }

    const wrap = document.createElement('div');
    wrap.className = 'lb-media-wrap';
    const timeout = wasCached ? 400 : 2000;

    if (f.type?.startsWith('video/')) {
      const video = document.createElement('video');
      this._createdVideos.add(video);
      video.src = url;
      video.controls = true;
      video.loop = true;
      video.playsInline = true;
      video.preload = 'auto';
      video.addEventListener('ended', () => { if (this.ssRunning) this.ssAutoNext(); });
      await new Promise(r => { video.onloadeddata = r; setTimeout(r, timeout); });
      wrap.appendChild(video);
    } else {
      const img = document.createElement('img');
      img.src = url;
      await new Promise(r => { img.onload = r; setTimeout(r, timeout); });
      // Wrap in kb-clip for Ken Burns clipping
      const clip = document.createElement('div');
      clip.className = 'kb-clip';
      clip.appendChild(img);
      wrap.appendChild(clip);
    }

    // Heart button (SVG for cross-platform consistency)
    const heart = document.createElement('div');
    heart.className = 'lb-fav-btn' + (this.favSet.has(f.origDriveId) ? ' active' : '');
    heart.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
    heart.onclick = (e) => { e.stopPropagation(); this.toggleFavorite(f, heart); };
    heart.addEventListener('touchend', (e) => {
      e.stopPropagation();
      e.preventDefault();
      this.toggleFavorite(f, heart);
    });
    wrap.appendChild(heart);

    // Go to folder button (only show when file has folder info)
    if (f._folderId) {
      const goBtn = document.createElement('div');
      goBtn.className = 'lb-goto-btn';
      goBtn.title = f._folderName || '폴더로 이동';
      goBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
      goBtn.onclick = (e) => { e.stopPropagation(); this.goToFileFolder(f); };
      goBtn.addEventListener('touchend', (e) => { e.stopPropagation(); e.preventDefault(); this.goToFileFolder(f); });
      wrap.appendChild(goBtn);
    }

    // Heart animation element
    const heartAnim = document.createElement('div');
    heartAnim.className = 'lb-heart-anim';
    heartAnim.innerHTML = '<svg width="60" height="60" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
    wrap.appendChild(heartAnim);

    // Fav toast inside this wrap
    const favToast = document.createElement('div');
    favToast.className = 'lb-fav-toast';
    wrap.appendChild(favToast);

    // Position heart and goto button over actual image area (not letterbox)
    const media = wrap.querySelector('img, video');
    const goBtn = wrap.querySelector('.lb-goto-btn');
    const clip = wrap.querySelector('.kb-clip');
    const positionHeart = () => {
      if (!media || !wrap.offsetHeight) return;
      const cw = wrap.offsetWidth, ch = wrap.offsetHeight;
      const nw = media.naturalWidth || media.videoWidth || cw;
      const nh = media.naturalHeight || media.videoHeight || ch;
      if (!nw || !nh) return;
      const scale = Math.min(cw / nw, ch / nh);
      const rw = nw * scale, rh = nh * scale;
      const offTop = (ch - rh) / 2, offLeft = (cw - rw) / 2;
      heart.style.top = (offTop + 10) + 'px';
      heart.style.left = (offLeft + 10) + 'px';
      if (goBtn) {
        goBtn.style.top = (offTop + 10) + 'px';
        goBtn.style.left = (offLeft + 48) + 'px';
      }
      // Size kb-clip to match rendered image area
      if (clip) {
        clip.style.width = Math.round(rw) + 'px';
        clip.style.height = Math.round(rh) + 'px';
        clip.style.top = Math.round(offTop) + 'px';
        clip.style.left = Math.round(offLeft) + 'px';
      }
    };
    requestAnimationFrame(() => requestAnimationFrame(positionHeart));
    new ResizeObserver(positionHeart).observe(wrap);

    // Double-click to toggle favorite
    const doFavToggle = () => {
      this.toggleFavorite(f, heart);
    };

    // Desktop: dblclick to toggle favorite (images only, videos use heart button)
    wrap.addEventListener('dblclick', (e) => {
      if (e.target.closest('.lb-fav-btn') || e.target.closest('.lb-goto-btn') || e.target.closest('video')) return;
      e.preventDefault();
      doFavToggle();
    });

    // Mobile: double-tap detection (images only)
    let lastTap = 0;
    wrap.addEventListener('touchend', (e) => {
      if (e.target.closest('.lb-fav-btn') || e.target.closest('.lb-goto-btn') || e.target.closest('video')) return;
      const now = Date.now();
      if (now - lastTap < 300) { e.preventDefault(); doFavToggle(); lastTap = 0; }
      else { lastTap = now; }
    });

    return wrap;
  },

  async preloadNext(currentIndex) {
    const range = this._isMobile ? Math.min(this.viewCount * 2, 2) : this.viewCount * 4;
    const promises = [];
    for (let offset = 1; offset <= range; offset++) {
      for (const idx of [currentIndex + offset, currentIndex - offset]) {
        if (idx < 0 || idx >= this.currentFiles.length) continue;
        const nf = this.currentFiles[idx];
        if (this.preloadCache.has(nf.origDriveId)) continue;
        promises.push(this._preloadOne(nf));
      }
    }
    Promise.all(promises).catch(() => {});
    this.startBgPreload(currentIndex);
  },

  async _preloadOne(f) {
    if (this.preloadCache.has(f.origDriveId)) return;
    try {
      const blob = new Blob([await Crypto.decrypt(this.key, await Drive.download(f.origDriveId))], {type:f.type});
      this.preloadCache.set(f.origDriveId, URL.createObjectURL(blob));
    } catch {}
  },

  startBgPreload(centerIndex) {
    if (this.bgPreloadAbort) this.bgPreloadAbort.abort = true;
    const ctrl = { abort: false };
    this.bgPreloadAbort = ctrl;

    const startOffset = (this._isMobile ? 3 : 5) + 1;
    const bgConcurrency = this._isMobile ? 1 : 3;
    const queue = [];
    for (let offset = startOffset; offset < this.currentFiles.length; offset++) {
      if (queue.length >= this.PRELOAD_CACHE_LIMIT) break;
      const fwd = centerIndex + offset;
      const bwd = centerIndex - offset;
      if (fwd < this.currentFiles.length) queue.push(fwd);
      if (bwd >= 0) queue.push(bwd);
    }

    (async () => {
      for (let i = 0; i < queue.length; i += bgConcurrency) {
        if (ctrl.abort) return;
        if (this.preloadCache.size >= this.PRELOAD_CACHE_LIMIT) return;
        const batch = queue.slice(i, i + bgConcurrency).map(idx => {
          const f = this.currentFiles[idx];
          if (!f || this.preloadCache.has(f.origDriveId)) return Promise.resolve();
          return this._preloadOne(f);
        });
        await Promise.all(batch);
      }
    })();
  },

  // ===== SLIDESHOW =====
  toggleSSPanel() {
    const panel = document.getElementById('ssPanel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
      const kb = document.getElementById('ssKenBurns');
      if (kb) kb.checked = localStorage.getItem('sg_kenBurns') === '1';
    }
  },

  closeSSPanel() {
    document.getElementById('ssPanel').classList.remove('open');
  },

  // Lightbox bottom button: show panel if stopped, stop if running
  lbSSToggle() {
    if (this.ssRunning) {
      this.stopSlideshow();
    } else {
      this.toggleSSPanel();
    }
  },

  // Spacebar: toggle without panel
  toggleSlideshow() {
    if (this.ssRunning) {
      this.stopSlideshow();
    } else {
      this.startSlideshow();
    }
  },

  startSlideshow() {
    const intervalEl = document.getElementById('ssInterval');
    const orderEl = document.getElementById('ssOrder');
    const kbEl = document.getElementById('ssKenBurns');
    this.ssInterval = parseInt(intervalEl.value) || 4;
    this.ssOrder = orderEl.value;
    this.ssKenBurns = kbEl?.checked || false;
    if (kbEl) localStorage.setItem('sg_kenBurns', this.ssKenBurns ? '1' : '0');
    this.ssRunning = true;
    this.closeSSPanel();
    document.getElementById('lbSSBtn').classList.add('active');
    document.getElementById('lbSSBtn').textContent = '⏸ 정지';
    const orderLabel = this.ssOrder === 'random' ? '랜덤' : '순차';
    const kbLabel = this.ssKenBurns ? ' · 확대' : '';
    this.showHud('▶', '슬라이드쇼', `${orderLabel} · ${this.ssInterval}초${kbLabel}`);
    this._applyKenBurns();
    this.ssScheduleNext();
  },

  _applyKenBurns() {
    const wraps = document.querySelectorAll('#lbContent .lb-media-wrap');
    wraps.forEach(w => {
      if (this.ssRunning && this.ssKenBurns) {
        w.classList.add('ken-burns');
      } else {
        w.classList.remove('ken-burns');
      }
    });
  },

  stopSlideshow(silent) {
    if (!this.ssRunning) return;
    this.ssRunning = false;
    clearTimeout(this.ssTimer);
    this.ssTimer = null;
    const btn = document.getElementById('lbSSBtn');
    if (btn) { btn.classList.remove('active'); btn.textContent = '▶ 슬라이드쇼'; }
    const video = document.querySelector('#lbContent video');
    if (video) video.loop = true;
    this._applyKenBurns();
    if (!silent) this.showHud('⏸', '일시정지', '');
  },

  ssScheduleNext() {
    if (!this.ssRunning) return;
    // Always clear previous timer to prevent duplicates
    clearTimeout(this.ssTimer);
    this.ssTimer = null;
    this._applyKenBurns();
    const f = this.currentFiles[this.lbIndex];

    // For videos: disable loop, wait for 'ended' event
    if (f?.type?.startsWith('video/')) {
      const video = document.querySelector('#lbContent video');
      if (video) video.loop = false;
      return; // 'ended' event will call ssAutoNext
    }

    // For images: use timer
    this.ssTimer = setTimeout(() => {
      if (!this.ssRunning) return;
      this.ssAutoNext();
    }, this.ssInterval * 1000);
  },

  ssAutoNext() {
    if (!this.ssRunning) return;
    let next;
    if (this.ssOrder === 'random') {
      if (this.currentFiles.length > 1) {
        do { next = Math.floor(Math.random() * this.currentFiles.length); }
        while (next === this.lbIndex);
      } else { next = 0; }
    } else {
      const step = this.viewCount;
      next = this.lbIndex + step;
      if (next >= this.currentFiles.length) next = 0;
    }
    this.lbIndex = next;
    this.showLBItem(next).then(() => this.ssScheduleNext());
  },

  // ===== FULLSCREEN =====
  toggleFullscreen() {
    const lb = document.getElementById('lightbox');
    if (document.fullscreenElement) {
      document.exitFullscreen();
    } else {

  // ===== LUCKY PICKS =====
  async loadLuckyPicks(force) {
    const area = document.getElementById('luckyArea');
    if (!area) return;

    const today = new Date().toDateString();

    // 1. Memory cache (same session)
    if (!force && this._luckyCache && this._luckyDate === today) {
      this._renderLuckyFromCache(area);
      return;
    }

    // 2. localStorage cache (across refreshes)
    if (!force) {
      try {
        const stored = localStorage.getItem('sg_lucky');
        if (stored) {
          const parsed = JSON.parse(stored);
          if (parsed.date === today) {
            this._luckyCache = { images: parsed.images, videos: parsed.videos };
            this._luckyDate = today;
            this._renderLuckyFromCache(area);
            return;
          }
        }
      } catch {}
    }

    // 3. Fresh scan
    area.innerHTML = `<div style="display:flex;align-items:center;gap:10px;">
      <span style="color:var(--text2);font-size:13px;" id="luckyStatus">폴더 스캔 중...</span>
      <div style="flex:1;max-width:200px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden">
        <div id="luckyBar" style="height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width 0.2s"></div>
      </div>
    </div>`;
    const bar = document.getElementById('luckyBar');
    const status = document.getElementById('luckyStatus');

    const allFolders = [];
    try {
      let rootChildren = this.treeCache[this.rootDriveId];
      if (!rootChildren) {
        rootChildren = await Drive.listFolders(this.rootDriveId);
        this.treeCache[this.rootDriveId] = rootChildren;
      }
      const topFolders = rootChildren.filter(f => f.name !== 'index' && f.name !== 'thumbs' && f.name !== 'files');
      const totalTop = topFolders.length;
      let scanned = 0;

      for (const top of topFolders) {
        allFolders.push(top);
        let children = this.treeCache[top.id];
        if (!children) {
          children = await Drive.listFolders(top.id);
          this.treeCache[top.id] = children;
        }
        for (const sub of children) {
          allFolders.push(sub);
          let subChildren = this.treeCache[sub.id];
          if (!subChildren) {
            subChildren = await Drive.listFolders(sub.id);
            this.treeCache[sub.id] = subChildren;
          }
          for (const subsub of subChildren) {
            allFolders.push(subsub);
          }
        }
        scanned++;
        if (bar) bar.style.width = Math.round((scanned / totalTop) * 50) + '%';
      }
    } catch (e) { console.error('Lucky scan error:', e); }

    if (allFolders.length === 0) { area.innerHTML = ''; return; }

    if (status) status.textContent = '추천 선별 중...';
    if (bar) bar.style.width = '50%';

    const filtered = allFolders.filter(f => f.name !== 'RIFE');
    const videoFolders = filtered.filter(f => f.name === '1.Landscape' || f.name === '2.Portrait');
    const otherFolders = filtered.filter(f => f.name !== '1.Landscape' && f.name !== '2.Portrait');
    for (let i = otherFolders.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [otherFolders[i], otherFolders[j]] = [otherFolders[j], otherFolders[i]];
    }
    const shuffled = [...videoFolders, ...otherFolders.slice(0, 20 - videoFolders.length)];
    const allImages = [];
    const allVideos = [];
    let loaded = 0;

    const results = await Promise.allSettled(shuffled.map(async folder => {
      const indexId = await Drive.findFile('_index.enc', folder.id);
      if (!indexId) { loaded++; return []; }
      const files = await Crypto.decryptJSON(this.key, await Drive.download(indexId));
      loaded++;
      if (bar) bar.style.width = Math.round(50 + (loaded / shuffled.length) * 50) + '%';
      return files.filter(f => !this.hiddenSet.has(f.origDriveId)).map(f => ({ ...f, _folderId: folder.id, _folderName: folder.name }));
    }));

    for (const r of results) {
      if (r.status !== 'fulfilled') continue;
      for (const entry of r.value) {
        if (entry.type?.startsWith('video/')) allVideos.push(entry);
        else allImages.push(entry);
      }
    }

    const pickRandom = (arr, n) => {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a.slice(0, n);
    };
    const pickedImages = pickRandom(allImages, 20);
    const pickedVideos = pickRandom(allVideos, 20);

    this._luckyCache = { images: pickedImages, videos: pickedVideos };
    this._luckyDate = today;

    // Save to localStorage
    try { localStorage.setItem('sg_lucky', JSON.stringify({ date: today, images: pickedImages, videos: pickedVideos })); } catch {}

    this._renderLuckyFromCache(area);

    const otherFolders = filtered.filter(f => f.name !== '1.Landscape' && f.name !== '2.Portrait');
    const shuffle = arr => { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; };
    const picked = [...videoFolders, ...shuffle(otherFolders).slice(0, 58)];

  _stopAllMedia() {

    // Stop any orphan videos (created but not appended to DOM)
